<mat-stepper
  #stepper
  linear="true">
  <mat-step label="Cidade de operação">
    <ng-template matStepContent>
      <h2 class="text-center mb-4">Selecione uma cidade de operação</h2>
      <div class="main-grid">
        @for (cidadeOperacao of cidadesOperacao; track cidadeOperacao) {
          <div class="w-100 d-flex justify-content-center">
            <app-main-card
              [empresa]="empresa"
              [cidadeOperacao]="cidadeOperacao"
              (selecionarCidadeOperacao)="selecionaCidadeOperacao($event)">
            </app-main-card>
          </div>
        }
      </div>
    </ng-template>
  </mat-step>
  <mat-step label="Tipo de vistoria">
    <ng-template matStepContent>
      <h2 class="text-center mb-4">Selecione uma cidade de operação</h2>
      <div class="main-grid">
        @for (tipoVistoria of tiposDeVistoria; track tipoVistoria) {
          <div class="w-100 d-flex justify-content-center">
            <app-main-card
              [empresa]="empresa"
              [tipoVistoria]="tipoVistoria"
              (selecionarTipoVistoria)="selecionaTipoVistoria($event)">
            </app-main-card>
          </div>
        }
      </div>
    </ng-template>
  </mat-step>
  <mat-step label="Data e horário">
    <ng-template matStepContent>
      pagina 3
      <div>
        <button matButton matStepperPrevious>Back</button>
        <button matButton matStepperNext>Next</button>
      </div>
    </ng-template>
  </mat-step>
  <mat-step label="Dados da solicitação">
    <ng-template matStepContent>
      pagina 3
      <div>
        <button matButton matStepperPrevious>Back</button>
        <button matButton matStepperNext>Next</button>
      </div>
    </ng-template>
  </mat-step>
  <mat-step label="Dados da solicitação">
    <ng-template matStepContent>
      pagina 3
      <div>
        <button matButton matStepperPrevious>Back</button>
        <button matButton matStepperNext>Next</button>
      </div>
    </ng-template>
  </mat-step>
  <mat-step label="Revisão">
    <ng-template matStepContent>
      pagina 3
      <div>
        <button matButton matStepperPrevious>Back</button>
        <button matButton matStepperNext>Next</button>
      </div>
    </ng-template>
  </mat-step>
  <mat-step label="Confirmação">
    <ng-template matStepContent>
      pagina 3
      <div>
        <button matButton matStepperPrevious>Back</button>
        <button matButton matStepperNext>Next</button>
      </div>
    </ng-template>
  </mat-step>
</mat-stepper>
